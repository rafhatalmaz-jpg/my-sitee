<!DOCTYPE html><html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Мой план обучения</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }.container {
  background: rgba(255,255,255,0.05);
  padding: 30px;
  border-radius: 20px;
  width: 350px;
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

.block {
  margin-bottom: 15px;
  padding: 15px;
  border-radius: 12px;
  background: rgba(255,255,255,0.08);
  transition: 0.3s;
  cursor: pointer;
}

.block:hover {
  transform: scale(1.05);
  background: rgba(255,255,255,0.15);
}

.time {
  font-weight: bold;
  color: #38bdf8;
}

.task {
  margin-top: 5px;
  font-size: 14px;
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: white;
  font-size: 16px;
  cursor: pointer;
  margin-top: 10px;
}

button:hover {
  background: #16a34a;
}

  </style>
</head>
<body><div class="container">
  <h1>Мой план 🚀</h1>  <div class="block">
    <div class="time">1 час</div>
    <div class="task">Изучаю создание сайтов (HTML/CSS)</div>
  </div>  <div class="block">
    <div class="time">2 час</div>
    <div class="task">Изучаю маркетинг и продвижение</div>
  </div><button onclick="startPlan()">Начать</button>

</div><script>
function startPlan() {
  alert("Погнали! Сначала сайты, потом маркетинг 🔥");
}
</script></body>
</html>
